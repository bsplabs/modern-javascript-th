<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern JavaScript Tutorial (TH)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/themes/vue.css">
  <style>
    .sidebar-nav > ul > li > a {
      font-size: 1.1em;
      font-weight: 600;
      color: #58a6ff;
    }
    .sidebar-nav > ul > li > ul > li > a {
      color: #c9d1d9;
    }
    .markdown-section code {
      background: #161b22;
      color: #f0883e;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .markdown-section pre {
      background: #0d1117;
      border: 1px solid #30363d;
    }
    .markdown-section pre code {
      background: transparent;
      color: #c9d1d9;
    }
  </style>
</head>
<body>
  <div id="app">กำลังโหลด...</div>
  <script>
    window.$docsify = {
      name: 'Modern JavaScript Tutorial',
      repo: 'bsplabs/modern-javascript-th',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      themeColor: '#58a6ff',
      search: {
        placeholder: 'ค้นหา...',
        noData: 'ไม่พบผลลัพธ์'
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-cli@4"></script>
